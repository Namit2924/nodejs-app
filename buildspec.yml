version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - npm install

  build:
    commands:
      - echo Deploying to EC2

      # Install SSH client
      - yum install -y openssh-clients

      # Get private key
      - aws ssm get-parameter --name "ec2-key" --with-decryption --query Parameter.Value --output text > key.pem
      - chmod 400 key.pem

      # SSH into EC2 and deploy
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@13.234.113.72 "
          cd nodejs-app &&
          git pull &&
          npm install &&
          pm2 restart all || pm2 start app.js
        "

artifacts:
  files:
    - '**/*'